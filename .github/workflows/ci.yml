name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Prepare test database
        env:
          RAILS_ENV: test
        run: bin/rails db:prepare

      - name: Run RuboCop (lint)
        run: bundle exec rubocop

      - name: Run RSpec (tests)
        env:
          RAILS_ENV: test
        run: bundle exec rspec

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-practice-todo-demo:ci .

      - name: Smoke-test container boots and serves
        run: |
          docker run -d --name demo -p 3000:3000 ai-practice-todo-demo:ci
          for i in $(seq 1 15); do
            if curl -fs http://localhost:3000/ > /dev/null; then
              echo "App responded successfully."
              exit 0
            fi
            sleep 2
          done
          echo "App did not respond in time."
          docker logs demo
          exit 1
